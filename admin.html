<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>حيّ — لوحة الإدارة</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#F2F2F7;--surface:#fff;--text:#1D1D1F;--text2:#3A3A3C;
  --text3:#636366;--text4:#AEAEB2;--sep:rgba(60,60,67,0.12);
  --red:#FF3B30;--green:#34C759;--blue:#007AFF;--orange:#FF9500;
  --navy:#0A2540;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;font-family:'Tajawal',sans-serif}
body{background:var(--bg);color:var(--text);min-height:100vh}
.screen{display:none;flex-direction:column;min-height:100vh}
.screen.active{display:flex}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* BUTTONS */
.btn{display:block;width:100%;padding:16px;border:none;border-radius:14px;font-size:16px;font-weight:700;font-family:'Tajawal',sans-serif;cursor:pointer;transition:opacity .15s,transform .1s}
.btn:active{opacity:.8;transform:scale(.985)}
.btn-dark{background:#1D1D1F;color:#fff}
.btn-green{background:var(--green);color:#fff}
.btn-ghost{background:none;border:none;font-family:'Tajawal',sans-serif;color:var(--text3);cursor:pointer;font-size:14px;padding:8px}
.field{background:var(--bg);border:none;border-radius:12px;padding:15px 16px;font-size:16px;font-family:'Tajawal',sans-serif;color:var(--text);width:100%;outline:none}

/* CARD */
.card{background:var(--surface);border-radius:16px;overflow:hidden;margin-bottom:12px;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.card-header{padding:14px 16px;border-bottom:1px solid var(--sep);font-size:15px;font-weight:700;display:flex;align-items:center;justify-content:space-between}

/* TAB BAR */
.tab-bar{display:flex;background:var(--surface);border-bottom:1px solid var(--sep);overflow-x:auto;scrollbar-width:none;flex-shrink:0}
.tab-bar::-webkit-scrollbar{display:none}
.tab-item{flex:1;min-width:72px;padding:13px 8px;font-size:13px;font-weight:600;font-family:'Tajawal',sans-serif;background:none;border:none;border-bottom:2px solid transparent;color:var(--text3);cursor:pointer;white-space:nowrap;transition:color .15s}
.tab-item.active{color:var(--navy);border-bottom-color:var(--navy)}
.tab-pane{display:none;padding:14px 14px 40px;animation:fadeIn .22s ease}
.tab-pane.active{display:block}

/* STATS */
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.stat-card{background:var(--surface);border-radius:16px;padding:16px;text-align:center;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.stat-num{font-size:32px;font-weight:900;line-height:1}
.stat-lbl{font-size:12px;color:var(--text3);margin-top:4px}

/* MERCHANT ROW */
.m-row{display:flex;align-items:center;padding:12px 14px;border-bottom:1px solid var(--sep);gap:12px}
.m-row:last-child{border-bottom:none}
.m-icon{width:44px;height:44px;border-radius:12px;background:var(--bg);display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;overflow:hidden}
.m-icon img{width:100%;height:100%;object-fit:cover}

/* TOGGLE */
.toggle{width:48px;height:28px;border-radius:14px;background:#DCDCDC;cursor:pointer;position:relative;transition:background .2s;flex-shrink:0;border:none;outline:none}
.toggle::after{content:'';position:absolute;width:22px;height:22px;border-radius:50%;background:#fff;top:3px;right:3px;transition:right .2s;box-shadow:0 1px 3px rgba(0,0,0,.25)}
.toggle.on{background:var(--green)}
.toggle.on::after{right:23px}

/* COUPON ROW */
.c-row{display:flex;align-items:center;justify-content:space-between;padding:11px 14px;border-bottom:1px solid var(--sep)}
.c-row:last-child{border-bottom:none}
.status-badge{font-size:11px;font-weight:700;padding:3px 10px;border-radius:10px;flex-shrink:0}
.s-used{background:rgba(52,199,89,.12);color:#1a7a3a}
.s-pending{background:rgba(255,149,0,.12);color:#8a5000}
.s-expired{background:rgba(142,142,147,.12);color:var(--text3)}

/* COMPLAINT ROW */
.comp-row{padding:14px;border-bottom:1px solid var(--sep)}
.comp-row:last-child{border-bottom:none}

/* FILTER PILLS */
.pill-wrap{display:flex;gap:8px;overflow-x:auto;scrollbar-width:none;margin-bottom:12px}
.pill-wrap::-webkit-scrollbar{display:none}
.pill{padding:7px 16px;border:1.5px solid var(--sep);border-radius:20px;background:var(--surface);font-size:13px;font-weight:600;font-family:'Tajawal',sans-serif;color:var(--text3);cursor:pointer;white-space:nowrap;flex-shrink:0;transition:all .15s}
.pill.active{background:#1D1D1F;color:#fff;border-color:#1D1D1F}

/* EMPTY */
.empty{text-align:center;padding:40px 0;color:var(--text4)}
.empty-icon{font-size:32px;margin-bottom:8px}
.empty-txt{font-size:14px}

/* TOAST */
#toast{position:fixed;bottom:calc(env(safe-area-inset-bottom,0px)+16px);left:50%;transform:translateX(-50%) translateY(80px);background:#1D1D1F;color:#fff;padding:10px 22px;border-radius:20px;font-size:14px;font-weight:600;z-index:9999;transition:transform .35s cubic-bezier(.34,1.56,.64,1);white-space:nowrap;pointer-events:none}
#toast.show{transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>

<!-- ══ LOGIN ══ -->
<div class="screen active" id="screen-login">
  <div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px">
    <div style="width:76px;height:76px;background:var(--navy);border-radius:22px;display:flex;align-items:center;justify-content:center;font-size:34px;margin-bottom:24px;box-shadow:0 8px 24px rgba(10,37,64,.3)">🛡️</div>
    <div style="font-size:26px;font-weight:900;color:var(--navy);margin-bottom:4px">لوحة الإدارة</div>
    <div style="font-size:14px;color:var(--text3);margin-bottom:40px">حيّ — شرورة</div>
    <div style="width:100%;max-width:320px">
      <div style="position:relative;margin-bottom:12px">
        <input type="password" id="admin-pass" placeholder="كلمة المرور" class="field" style="padding-left:46px">
        <button id="toggle-pass" style="position:absolute;left:14px;top:50%;transform:translateY(-50%);background:none;border:none;font-size:20px;cursor:pointer">👁️</button>
      </div>
      <div id="login-err" style="display:none;color:var(--red);font-size:13px;text-align:center;margin-bottom:10px;padding:8px;background:rgba(255,59,48,.06);border-radius:10px">❌ كلمة المرور غير صحيحة</div>
      <button class="btn btn-dark" id="login-btn">دخول ←</button>
    </div>
  </div>
</div>

<!-- ══ DASHBOARD ══ -->
<div class="screen" id="screen-dashboard" style="overflow:hidden;height:100vh">

  <!-- Header -->
  <div style="background:var(--navy);padding:calc(env(safe-area-inset-top,0px)+14px) 18px 14px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0">
    <div style="display:flex;align-items:center;gap:10px">
      <div style="font-size:22px">🛡️</div>
      <div>
        <div style="font-size:16px;font-weight:700;color:#fff">لوحة الإدارة</div>
        <div style="font-size:11px;color:rgba(255,255,255,.55)">حيّ — شرورة</div>
      </div>
    </div>
    <button id="refresh-btn" style="background:rgba(255,255,255,.12);border:none;color:#fff;padding:7px 14px;border-radius:20px;font-size:13px;font-weight:600;font-family:'Tajawal',sans-serif;cursor:pointer;margin-left:8px">🔄</button>
    <button id="logout-btn" style="background:rgba(255,255,255,.12);border:none;color:#fff;padding:7px 14px;border-radius:20px;font-size:13px;font-weight:600;font-family:'Tajawal',sans-serif;cursor:pointer">خروج</button>
  </div>

  <!-- Tab Bar -->
  <div class="tab-bar">
    <button class="tab-item active" data-tab="overview">📊 عام</button>
    <button class="tab-item" data-tab="merchants">🏪 التجار</button>
    <button class="tab-item" data-tab="coupons">🎟️ الكوبونات</button>
    <button class="tab-item" data-tab="complaints">⚠️ الشكاوى</button>
  </div>

  <!-- Scrollable Content -->
  <div style="flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch">

    <!-- ▸ OVERVIEW ◂ -->
    <div class="tab-pane active" id="tab-overview">
      <div class="stats-grid" style="margin-top:2px">
        <div class="stat-card"><div class="stat-num" id="s-merchants">—</div><div class="stat-lbl">إجمالي التجار</div></div>
        <div class="stat-card"><div class="stat-num" style="color:var(--green)" id="s-active">—</div><div class="stat-lbl">نشطون</div></div>
        <div class="stat-card"><div class="stat-num" style="color:var(--blue)" id="s-today">—</div><div class="stat-lbl">كوبونات اليوم</div></div>
        <div class="stat-card"><div class="stat-num" style="color:var(--orange)" id="s-complaints">—</div><div class="stat-lbl">شكاوى مفتوحة</div></div>
      </div>

      <div class="card">
        <div class="card-header">📈 هذا الأسبوع</div>
        <div style="padding:14px">
          <div style="display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--sep)">
            <span style="font-size:14px;color:var(--text3)">كوبونات مُستخدمة</span>
            <span style="font-size:14px;font-weight:700" id="w-used">—</span>
          </div>
          <div style="display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--sep)">
            <span style="font-size:14px;color:var(--text3)">منتهية الصلاحية</span>
            <span style="font-size:14px;font-weight:700" id="w-expired">—</span>
          </div>
          <div style="display:flex;justify-content:space-between;padding:7px 0">
            <span style="font-size:14px;color:var(--text3)">معدل الاستخدام</span>
            <span style="font-size:14px;font-weight:700;color:var(--blue)" id="w-rate">—</span>
          </div>
        </div>
      </div>

      <div class="card">
        <div class="card-header">🏆 أكثر التجار نشاطاً</div>
        <div id="top-merchants"></div>
      </div>
    </div>

    <!-- ▸ MERCHANTS ◂ -->
    <div class="tab-pane" id="tab-merchants">
      <input type="text" id="search-m" class="field" placeholder="🔍 بحث..." style="margin-bottom:12px">
      <div class="card"><div id="merchants-list"></div></div>
    </div>

    <!-- ▸ COUPONS ◂ -->
    <div class="tab-pane" id="tab-coupons">
      <div class="pill-wrap">
        <button class="pill active" data-cf="all">الكل</button>
        <button class="pill" data-cf="used">مُستخدم</button>
        <button class="pill" data-cf="pending">نشط</button>
        <button class="pill" data-cf="expired">منتهي</button>
      </div>
      <div class="card"><div id="coupons-list"></div></div>
    </div>

    <!-- ▸ COMPLAINTS ◂ -->
    <div class="tab-pane" id="tab-complaints">
      <div class="pill-wrap">
        <button class="pill active" data-compf="open">مفتوحة</button>
        <button class="pill" data-compf="resolved">محلولة</button>
      </div>
      <div class="card"><div id="complaints-list"></div></div>
    </div>

  </div>
</div>

<div id="toast"></div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js';
import { getFirestore, collection, getDocs, query, where, doc, setDoc, serverTimestamp } from 'https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js';

const app = initializeApp({
  apiKey:'AIzaSyAPkinYnCQr8dJPxuYLRFI5ZrC56hR-reg',
  authDomain:'fbrg87.firebaseapp.com',projectId:'fbrg87',
  storageBucket:'fbrg87.firebasestorage.app',
  messagingSenderId:'811335912659',
  appId:'1:811335912659:web:a923cc11d16315dfd4d826'
});
const db = getFirestore(app);

const ADMIN_PASS = 'hayy_admin_2026';
let allMerchants=[], allCoupons=[], allComplaints=[];
let couponFilter='all', complaintFilter='open';
let failedAttempts=0, lockoutUntil=0;

// ── Helpers ──
function go(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2600);
}
function timeAgo(ts){
  if(!ts) return '—';
  const d=ts?.toDate?ts.toDate():new Date(ts);
  const s=(Date.now()-d)/1000;
  if(s<60) return 'الآن';
  if(s<3600) return Math.floor(s/60)+' دقيقة';
  if(s<86400) return Math.floor(s/3600)+' ساعة';
  return Math.floor(s/86400)+' يوم';
}

// ── Login ──
document.getElementById('login-btn').addEventListener('click',()=>{
  const now=Date.now();
  const errEl=document.getElementById('login-err');
  if(now<lockoutUntil){
    const mins=Math.ceil((lockoutUntil-now)/60000);
    errEl.textContent=`🔒 محظور مؤقتاً — حاول بعد ${mins} دقيقة`;
    errEl.style.display='block'; return;
  }
  if(document.getElementById('admin-pass').value===ADMIN_PASS){
    failedAttempts=0;
    sessionStorage.setItem('h_admin','1');
    go('screen-dashboard'); loadAll();
  } else {
    failedAttempts++;
    document.getElementById('admin-pass').value='';
    if(failedAttempts>=5){
      lockoutUntil=Date.now()+15*60*1000;
      errEl.textContent='🔒 تم تجميد الدخول 15 دقيقة بعد 5 محاولات فاشلة';
    } else {
      errEl.textContent=`❌ كلمة المرور غير صحيحة (${failedAttempts}/5)`;
    }
    errEl.style.display='block';
    setTimeout(()=>errEl.style.display='none',4000);
  }
});
document.getElementById('admin-pass').addEventListener('keydown',e=>e.key==='Enter'&&document.getElementById('login-btn').click());
document.getElementById('toggle-pass').addEventListener('click',()=>{
  const i=document.getElementById('admin-pass');
  i.type=i.type==='password'?'text':'password';
});
document.getElementById('logout-btn').addEventListener('click',()=>{
  sessionStorage.removeItem('h_admin'); go('screen-login');
});
document.getElementById('refresh-btn').addEventListener('click',async()=>{
  const btn=document.getElementById('refresh-btn');
  btn.textContent='⏳'; btn.disabled=true;
  await loadAll(); toast('✅ تم التحديث');
  btn.textContent='🔄'; btn.disabled=false;
});

if(sessionStorage.getItem('h_admin')==='1'){ go('screen-dashboard'); loadAll(); }

// ── Load ──
async function loadAll(){
  await Promise.all([loadMerchants(), loadCoupons(), loadComplaints()]);
  updateOverview();
}

async function loadMerchants(){
  try{
    const snap=await getDocs(collection(db,'merchants'));
    allMerchants=snap.docs.map(d=>({id:d.id,...d.data()}));
    renderMerchants();
  }catch(e){toast('⚠️ خطأ في التجار');}
}

async function loadCoupons(){
  try{
    const snap=await getDocs(collection(db,'coupons'));
    allCoupons=snap.docs.map(d=>({id:d.id,...d.data()}))
      .sort((a,b)=>(b.created_at?.toDate?.()??0)-(a.created_at?.toDate?.()??0));
    renderCoupons();
  }catch(e){}
}

async function loadComplaints(){
  try{
    const snap=await getDocs(collection(db,'complaints'));
    allComplaints=snap.docs.map(d=>({id:d.id,...d.data()}))
      .sort((a,b)=>(b.created_at?.toDate?.()??0)-(a.created_at?.toDate?.()??0));
    renderComplaints();
  }catch(e){}
}

// ── Overview ──
function updateOverview(){
  const total=allMerchants.length;
  const active=allMerchants.filter(m=>m.active!==false).length;
  const today=new Date(); today.setHours(0,0,0,0);
  const cToday=allCoupons.filter(c=>{const t=c.created_at?.toDate?.();return t&&t>=today;}).length;
  const open=allComplaints.filter(c=>c.status==='open').length;

  document.getElementById('s-merchants').textContent=total;
  document.getElementById('s-active').textContent=active;
  document.getElementById('s-today').textContent=cToday;
  document.getElementById('s-complaints').textContent=open;

  const week=new Date(Date.now()-7*86400000);
  const wc=allCoupons.filter(c=>{const t=c.created_at?.toDate?.();return t&&t>=week;});
  const wUsed=wc.filter(c=>c.status==='used').length;
  const wExp=wc.filter(c=>c.status==='expired').length;
  document.getElementById('w-used').textContent=wUsed;
  document.getElementById('w-expired').textContent=wExp;
  document.getElementById('w-rate').textContent=wc.length?Math.round(wUsed/wc.length*100)+'%':'—';

  const countMap={};
  allCoupons.filter(c=>c.status==='used').forEach(c=>{
    if(c.business_name) countMap[c.business_name]=(countMap[c.business_name]||0)+1;
  });
  const top=Object.entries(countMap).sort((a,b)=>b[1]-a[1]).slice(0,5);
  document.getElementById('top-merchants').innerHTML=top.length
    ?top.map(([n,cnt],i)=>`
      <div style="display:flex;align-items:center;padding:10px 14px;border-bottom:1px solid var(--sep)${i===top.length-1?';border:none':''}">
        <span style="font-size:16px;font-weight:900;color:var(--text4);width:24px">${i+1}</span>
        <span style="flex:1;font-size:14px">${esc(n)}</span>
        <span style="font-size:13px;font-weight:700;color:var(--blue)">${cnt} كوبون</span>
      </div>`).join('')
    :'<div class="empty"><div class="empty-icon">📊</div><div class="empty-txt">لا بيانات بعد</div></div>';
}

// ── Merchants ──
function renderMerchants(q=''){
  const list=document.getElementById('merchants-list');
  const filtered=allMerchants.filter(m=>
    !q||m.store_name?.includes(q)||m.phone?.includes(q)
  );
  if(!filtered.length){
    list.innerHTML='<div class="empty"><div class="empty-icon">🏪</div><div class="empty-txt">لا يوجد تجار</div></div>';
    return;
  }
  list.innerHTML=filtered.map(m=>{
    const isActive=m.active!==false;
    return `<div class="m-row">
      <div class="m-icon">${m.logo_url?`<img src="${esc(m.logo_url)}">`:(m.icon||'🏪')}</div>
      <div style="flex:1;min-width:0">
        <div style="font-size:15px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(m.store_name||'بدون اسم')}</div>
        <div style="font-size:12px;color:var(--text3);margin-top:1px">${esc(m.phone||'—')}</div>
        <div style="font-size:12px;color:var(--text4);margin-top:1px">${esc(m.store_type||'')} ${m.discount?'• '+Number(m.discount)+'%':''}</div>
      </div>
      ${m.is_founder?'<span style="font-size:10px;background:var(--navy);color:#fff;border-radius:8px;padding:2px 8px;flex-shrink:0;margin-left:6px">🎖️ مؤسس</span>':''}
      <button class="toggle ${isActive?'on':''}" data-id="${esc(m.id)}" data-active="${isActive}"></button>
    </div>`;
  }).join('');
  list.querySelectorAll('.toggle').forEach(btn=>
    btn.addEventListener('click',()=>toggleMerchant(btn.dataset.id, btn.dataset.active==='true'))
  );
}

async function toggleMerchant(id, wasActive){
  const newActive=!wasActive;
  const btn=document.querySelector(`.toggle[data-id="${id}"]`);
  if(btn){btn.disabled=true;btn.style.opacity='.5';}
  try{
    await setDoc(doc(db,'merchants',id),{active:newActive,updated_at:serverTimestamp()},{merge:true});
    const m=allMerchants.find(m=>m.id===id);
    if(m) m.active=newActive;
    // Update businesses too
    const biz=await getDocs(query(collection(db,'businesses'),where('phone','==',m?.phone||'')));
    if(!biz.empty) await setDoc(doc(db,'businesses',biz.docs[0].id),{active:newActive},{merge:true});
    if(btn){btn.classList.toggle('on',newActive);btn.dataset.active=String(newActive);btn.disabled=false;btn.style.opacity='';}
    toast(newActive?'✅ تم التفعيل':'⛔ تم التعطيل');
    updateOverview();
  }catch(e){
    if(btn){btn.disabled=false;btn.style.opacity='';}
    toast('❌ حدث خطأ');
  }
}

document.getElementById('search-m').addEventListener('input',function(){renderMerchants(this.value.trim());});

// ── Coupons ──
function renderCoupons(){
  const list=document.getElementById('coupons-list');
  const filtered=couponFilter==='all'?allCoupons:allCoupons.filter(c=>c.status===couponFilter);
  if(!filtered.length){
    list.innerHTML='<div class="empty"><div class="empty-icon">🎟️</div><div class="empty-txt">لا توجد كوبونات</div></div>';
    return;
  }
  const map={used:'مُستخدم',pending:'نشط',expired:'منتهي'};
  const cls={used:'s-used',pending:'s-pending',expired:'s-expired'};
  list.innerHTML=filtered.slice(0,60).map(c=>`
    <div class="c-row">
      <div style="min-width:0;flex:1">
        <div style="font-weight:600;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(c.business_name||'—')}</div>
        <div style="font-size:12px;color:var(--text3);margin-top:2px;direction:ltr;text-align:right">${esc(c.code||'—')} · ${timeAgo(c.created_at)}</div>
      </div>
      <span class="status-badge ${cls[c.status]||'s-expired'}" style="margin-right:10px">${map[c.status]||'—'}</span>
    </div>`).join('');
}

document.querySelectorAll('.pill[data-cf]').forEach(btn=>
  btn.addEventListener('click',function(){
    document.querySelectorAll('.pill[data-cf]').forEach(b=>b.classList.remove('active'));
    this.classList.add('active');
    couponFilter=this.dataset.cf;
    renderCoupons();
  })
);

// ── Complaints ──
function renderComplaints(){
  const list=document.getElementById('complaints-list');
  const filtered=allComplaints.filter(c=>c.status===complaintFilter);
  if(!filtered.length){
    list.innerHTML=`<div class="empty"><div class="empty-icon">${complaintFilter==='open'?'✅':'📋'}</div><div class="empty-txt">${complaintFilter==='open'?'لا شكاوى مفتوحة':'لا شكاوى محلولة'}</div></div>`;
    return;
  }
  list.innerHTML=filtered.map(c=>`
    <div class="comp-row" id="crow-${esc(c.id)}">
      <div style="display:flex;justify-content:space-between;margin-bottom:5px">
        <span style="font-size:15px;font-weight:700">${esc(c.business_name||'محل غير معروف')}</span>
        <span style="font-size:12px;color:var(--text4)">${timeAgo(c.created_at)}</span>
      </div>
      <div style="font-size:13px;color:var(--text3);margin-bottom:${c.status==='open'?'10px':'0'}">كوبون: ${esc(c.coupon_id?.slice(-6)||'—')}</div>
      ${c.status==='open'
        ?`<button onclick="resolveComp('${esc(c.id)}')" style="width:100%;padding:10px;background:var(--green);color:#fff;border:none;border-radius:10px;font-size:13px;font-weight:700;font-family:'Tajawal',sans-serif;cursor:pointer">✅ تم الحل</button>`
        :`<span style="font-size:12px;color:var(--green);font-weight:600">✅ محلولة</span>`
      }
    </div>`).join('');
}

window.resolveComp=async function(id){
  const btn=document.querySelector(`#crow-${id} button`);
  if(btn){btn.textContent='...';btn.disabled=true;}
  try{
    await setDoc(doc(db,'complaints',id),{status:'resolved',resolved_at:serverTimestamp()},{merge:true});
    const c=allComplaints.find(c=>c.id===id);
    if(c) c.status='resolved';
    renderComplaints(); updateOverview();
    toast('✅ الشكوى محلولة');
  }catch(e){toast('❌ خطأ');}
};

document.querySelectorAll('.pill[data-compf]').forEach(btn=>
  btn.addEventListener('click',function(){
    document.querySelectorAll('.pill[data-compf]').forEach(b=>b.classList.remove('active'));
    this.classList.add('active');
    complaintFilter=this.dataset.compf;
    renderComplaints();
  })
);

// ── Tabs ──
document.querySelectorAll('.tab-item').forEach(btn=>
  btn.addEventListener('click',function(){
    document.querySelectorAll('.tab-item').forEach(b=>b.classList.remove('active'));
    document.querySelectorAll('.tab-pane').forEach(p=>p.classList.remove('active'));
    this.classList.add('active');
    document.getElementById('tab-'+this.dataset.tab).classList.add('active');
  })
);
</script>

<script>
  if('serviceWorker' in navigator)
    window.addEventListener('load',()=>navigator.serviceWorker.register('/sw.js').catch(()=>{}));
</script>
</body>
</html>
